<!DOCTYPE html>
    
<html lang="pt-br">

        <head>
            <script src="https://cdn.tailwindcss.com"></script>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Audiary.Login</title>
        </head>
        <body class="bg-gray-50 font-sans min-h-screen flex flex-col">
            <header class="bg-white shadow-sm py-4 px-8 flex justify-between items-center">
                <a href="/" class="flex items-center gap-2 hover:opacity-80 transition">
                    <div class="flex items-center gap-2">
                        <div class="bg-cyan-500 text-white p-2 rounded-lg font-bold">A</div>
                        <h1 class="text-xl font-bold">Audiary</h1>
                    </div>
                </a>
            
                <nav>
                    <a href="/cadastro" class="text-sm font-medium hover:text-cyan-500 transition">Cadastre-se!</a>
                </nav>
            </header>
            <main class="flex-grow flex items-center justify-center p-4">
                <div class="bg-white p-10 rounded-2xl shadow-sm border border-gray-100 w-full max-w-md">
                    
                   <div class="text-center mb-8">
                        <div class="inline-flex items-center gap-2 mb-4">
                            <div class="bg-cyan-500 text-white p-1.5 rounded text-xs font-bold">A</div>
                            <span class="text-xl font-bold">Audiary</span>
                        </div>
                        <h1 class="text-2xl font-bold text-gray-800">Bem vindo de Volta!</h1>
                        <p class="text-gray-400 text-sm mt-1">Entre na sua conta para continuar!</p>
                    </div>

                    <form action="/users/login" method="POST" class="space-y-6">
                        <div>
                            <label for="IDusuario" class="block text-sm font-medium text-gray-700 mb-1">E-mail ou Nome do Usuário:</label>
                            <input type="text" id="IDusuario" name="email" required placeholder="João@email.com" class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-cyan-500 focus:border-cyan-500 sm:text-sm">
                        </div>
                        <div>
                            <label for="IDsenha" class="block text-sm font-medium text-gray-700 mb-1">Senha:</label>
                            <input type="password" id="IDsenha" name="password" required placeholder="********" class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-cyan-500 focus:border-cyan-500 sm:text-sm">
                        </div>
                        <div class="flex items-center justify-between">
                            <div class="flex items-center">
                                <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-cyan-600 focus:ring-cyan-500 border-gray-300 rounded">
                                <label for="remember-me" class="ml-2 block text-xs text-gray-700 font-medium">Quer que eu lembre? </label>
                            </div>
                            <div class="text-xs">
                                <a href="/senha-esquecida" class="font-medium text-cyan-600 hover:text-cyan-500">Esqueceu a senha?</a>
                            </div>
                        </div>
                        <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-bold text-white bg-cyan-400 hover:bg-cyan-500 transition duration-150">
                            ENTRAR
                        </button>
                        <div class="mt-6 text-center text-xs text-gray-500">
                            Não tem conta? <a href="/cadastro" class="font-bold text-blue-700 hover:underline"> Cadastre-se</a>
                        </div>

                        <p class="mt-8 text-[10px] text-center text-gray-400">
                            Ao entrar, você concorda com a <a href="#" class="underline">Nossa venda coletiva de dados para a China</a>
                        </p>
                   </form>
                </div>
            </main>
        </body>
    </html>
