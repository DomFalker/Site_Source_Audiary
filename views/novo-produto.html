<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Audiary - Anunciar Produto</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/public/accessibility.css">
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">
    <a href="#main-content" class="skip-link">Ir para o conteúdo principal</a>
    
    <header class="bg-white shadow-sm py-4 px-8 flex justify-between items-center">
        <a href="/" class="flex items-center gap-2 hover:opacity-80 transition">
            <div class="bg-cyan-500 text-white p-2 rounded-lg font-bold text-sm">A</div>
            <h1 class="text-xl font-bold">Audiary</h1>
        </a>
        <nav class="flex items-center gap-6 text-sm font-medium">
            <a href="/produtos" class="text-gray-600 hover:text-cyan-500 transition">Explorar Produtos</a>
            {% if user %}
                <span class="text-gray-600">Olá, <strong class="text-cyan-600 font-semibold">{{ user.name }}</strong>!</span>
                <a href="/logout" class="bg-red-50 text-red-600 px-4 py-2 rounded-full hover:bg-red-100 transition">Sair</a>
            {% endif %}
        </nav>
    </header>

    <main id="main-content" class="flex-grow flex items-center justify-center p-4 my-10">
        <div class="bg-white p-10 rounded-2xl shadow-sm border border-gray-100 w-full max-w-md">
            <div class="text-center mb-8">
                <div class="inline-flex items-center gap-2 mb-4">
                    <div class="bg-cyan-500 text-white p-1.5 rounded text-xs font-bold">A</div>
                    <span class="text-xl font-bold">Audiary</span>
                </div>
                <h1 class="text-2xl font-bold text-gray-800">Anunciar Equipamento</h1>
                <p class="text-gray-400 text-sm mt-1">Transforme seu instrumento em dinheiro rápido!</p>
            </div>

            <!-- Alerta de Erro -->
            <div id="error-alert" class="hidden mb-6 p-4 rounded-xl bg-red-50 border border-red-200 flex items-start gap-3 transition-all duration-300" role="alert">
                <span class="text-red-500 text-lg" role="img" aria-label="Aviso">⚠️</span>
                <div class="text-sm text-red-700 font-medium" id="error-message"></div>
            </div>

            <form class="space-y-4">
                <input type="hidden" id="IDid_seller" name="id_seller" value="{{ user.id }}">
                
                <!-- Nome do Produto -->
                <div>
                    <label for="IDname" class="block text-sm font-medium text-gray-700 mb-1">Nome do Produto:</label>
                    <input type="text" id="IDname" name="name" required placeholder="Guitarra Fender Stratocaster..." class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 focus:outline-none sm:text-sm">
                </div>

                <!-- Marca -->
                <div>
                    <label for="IDbrand" class="block text-sm font-medium text-gray-700 mb-1">Marca / Fabricante:</label>
                    <input type="text" id="IDbrand" name="brand" required placeholder="Fender, Gibson, Yamaha..." class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 focus:outline-none sm:text-sm">
                </div>

                <!-- Preço -->
                <div>
                    <label for="IDprice" class="block text-sm font-medium text-gray-700 mb-1">Preço (R$):</label>
                    <input type="number" step="0.01" min="1" id="IDprice" name="price" required placeholder="1500,00" class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 focus:outline-none sm:text-sm">
                </div>

                <!-- Condição -->
                <div>
                    <label for="IDcondition" class="block text-sm font-medium text-gray-700 mb-1">Condição do Produto:</label>
                    <select id="IDcondition" name="condition" required class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 focus:outline-none sm:text-sm bg-white">
                        <option value="Novo">Novo</option>
                        <option value="Seminovo">Seminovo</option>
                        <option value="Usado">Usado</option>
                    </select>
                </div>

                <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-bold text-white bg-cyan-400 hover:bg-cyan-500 transition duration-150">
                    ANUNCIAR AGORA
                </button>
            </form>
        </div>
    </main>

    <footer class="py-6 text-center border-t border-gray-200 mt-auto">
        <p class="text-gray-400 text-[10px]">Copyrights: 2026 Audiary - Todos os direitos reservados para os fundadores.</p>
    </footer>

    <script src="/public/accessibility.js"></script>
    <script>
        const form = document.querySelector('form');
        const errorAlert = document.getElementById('error-alert');
        const errorMessage = document.getElementById('error-message');
        const submitButton = form.querySelector('button[type="submit"]');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorAlert.classList.add('hidden');
            errorMessage.textContent = '';
            submitButton.disabled = true;
            submitButton.textContent = 'PROCESSANDO...';

            const payload = {
                name: document.getElementById('IDname').value,
                brand: document.getElementById('IDbrand').value,
                price: parseFloat(document.getElementById('IDprice').value),
                condition: document.getElementById('IDcondition').value,
                id_seller: parseInt(document.getElementById('IDid_seller').value)
            };

            try {
                const response = await fetch('/products/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    window.location.href = '/produtos';
                } else {
                    const errorData = await response.json();
                    errorMessage.textContent = errorData.detail || 'Ocorreu um erro ao criar o anúncio. Tente novamente.';
                    errorAlert.classList.remove('hidden');
                }
            } catch (error) {
                errorMessage.textContent = 'Erro ao se conectar com o servidor.';
                errorAlert.classList.remove('hidden');
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = 'ANUNCIAR AGORA';
            }
        });
    </script>
</body>
</html>
