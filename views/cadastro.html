<!DOCTYPE html>
    <html lang="pt-br">
        <head>
            <meta charset="UTF-8">
            <title>AubeyMusician - Criar Conta</title>
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <script src="https://cdn.tailwindcss.com"></script>
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
            <link rel="stylesheet" href="/public/accessibility.css">
        </head>
        <body class="bg-gray-50 font-sans min-h-screen flex flex-col">
            <a href="#main-content" class="skip-link">Ir para o conteúdo principal</a>
            <header class="bg-white shadow-sm py-4 px-8 flex justify-between items-center">
                <a href="/" class="flex items-center gap-2 hover:opacity-80 transition">
                    <div class="bg-cyan-500 text-white p-2 rounded-lg font-bold text-sm">A</div>
                    <h1 class="text-xl font-bold">Audiary</h1>
                </a>
                <nav class="flex items-center gap-4 text-sm">
                    <i class="fa-regular fa-user text-gray-500" aria-hidden="true"></i>
                    <a href="/login" class="font-medium hover:text-cyan-500">Entrar</a>
                </nav>
            </header>
            <main id="main-content" class="flex-grow flex items-center justify-center p-4 my-10">
                <div class="bg-white p-10 rounded-2xl shadow-sm border border-gray-100 w-full max-w-md">
                    <div class="text-center mb-8">
                        <div class="inline-flex items-center gap-2 mb-4">
                            <div class="bg-cyan-500 text-white p-1.5 rounded text-xs font-bold">A</div>
                            <span class="text-xl font-bold">Audiary</span>
                        </div>
                        <h1 class="text-2xl font-bold text-gray-800">Criar Conta</h1>
                        <p class="text-gray-400 text-sm mt-1">Junte-se à "futura" maior comunidade musical do Mundo! do Brasil também!</p>
                    </div>
                    
                    <div class="flex border border-gray-200 rounded-lg overflow-hidden mb-6" role="group" aria-label="Tipo de conta">
                        <input type="hidden" name="tipo" id="userType" value="buyer">
                        <button type="button" id="buyerBtn" onclick="setType('buyer')" aria-pressed="true" class="flex-1 py-2 bg-cyan-400 text-white font-bold text-sm focus:ring-2 focus:ring-cyan-500 focus:outline-none">Comprador</button>
                        <button type="button" id="sellerBtn" onclick="setType('seller')" aria-pressed="false" class="flex-1 py-2 bg-white text-gray-500 font-medium text-sm hover:bg-gray-50 focus:ring-2 focus:ring-cyan-500 focus:outline-none">Vendedor</button>
                    </div>

                    <script>
                        function setType(type) {
                            document.getElementById('userType').value = type;
                            const buyerBtn = document.getElementById('buyerBtn');
                            const sellerBtn = document.getElementById('sellerBtn');
                            
                            if (type === 'buyer') {
                                buyerBtn.className = 'flex-1 py-2 bg-cyan-400 text-white font-bold text-sm focus:ring-2 focus:ring-cyan-500 focus:outline-none';
                                buyerBtn.setAttribute('aria-pressed', 'true');
                                sellerBtn.className = 'flex-1 py-2 bg-white text-gray-500 font-medium text-sm hover:bg-gray-50 focus:ring-2 focus:ring-cyan-500 focus:outline-none';
                                sellerBtn.setAttribute('aria-pressed', 'false');
                            } else {
                                sellerBtn.className = 'flex-1 py-2 bg-cyan-400 text-white font-bold text-sm focus:ring-2 focus:ring-cyan-500 focus:outline-none';
                                sellerBtn.setAttribute('aria-pressed', 'true');
                                buyerBtn.className = 'flex-1 py-2 bg-white text-gray-500 font-medium text-sm hover:bg-gray-50 focus:ring-2 focus:ring-cyan-500 focus:outline-none';
                                buyerBtn.setAttribute('aria-pressed', 'false');
                            }
                        }
                    </script>
                    <form action="/users/register" method="POST" class="space-y-4">
                        
                        <!--NOME DO LINDOOOO-->
                        <div class="Nome-Input">
                            <label for="IDnome" class="block text-sm font-medium text-gray-700 mb-1">Nome Completo:</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                                    <i class="fa-regular fa-user" aria-hidden="true"></i>
                                </span>
                                <input type="text" id="IDnome" name="nome" placeholder="João Altinho" class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md focus:ring-cyan-500 focus:border-cyan-500 sm:text-sm">
                            </div>
                        </div>
                        
                        <!-- local do Email bb -->
                        <div class="Email-Input">
                            <label for="IDemail" class="block text-sm font-medium text-gray-700 mb-1">E-mail:</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                                    <i class="fa-regular fa-envelope" aria-hidden="true"></i>
                                </span>
                                <input type="email" id="IDemail" name="email" required placeholder="joão@email.com" class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md focus:ring-cyan-500 focus:border-cyan-500 sm:text-sm">
                            </div>
                        </div>

                        <!--CEPPPPP-->
                        <div class="CEP-Input">
                            <label for="IDcep" class="block text-sm font-medium text-gray-700 mb-1">Cep*:</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                                    <i class="fa-solid fa-map-pin" aria-hidden="true"></i>
                                </span>
                                <input placeholder="00000-000" type="text" id="IDcep" name="cep" required maxlength="9"
                                    onblur="buscarCEP()"
                                    class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md focus:ring-cyan-500 focus:border-cyan-500 sm:text-sm">
                                <div class="Rua-input mt-4">
                                    <label for="IDrua" class="block text-sm font-medium text-gray-700 mb-1">Rua/Logradouro</label> 
                                    <input type="text" id="IDrua" name="rua" readonly placeholder="Preenchido automaticamente"
                                    class="block w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-md sm:text-sm text-gray-500">
                                </div>
                            </div>
                        </div>






                        <!--SENHA AQUI-->
                        <div class="Senha-Input">
                            <label for="IDsenha" class="block text-sm font-medium text-gray-700 mb-1">Senha:</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                                    <i class="fa-solid fa-lock" aria-hidden="true"></i>
                                </span>
                                <input type="password" id="IDsenha" name="senha" required placeholder="**********" class="block w-full pl-10 pr-10 py-2 border border-gray-300 rounded-md focus:ring-cyan-500 focus:border-cyan-500 sm:text-sm">
                            </div>
                        </div>

                        <!--Confirmar Senha-->
                        <div class="Senha-II-Input">
                            <label for="IDconfirmSenha" class="block text-sm font-medium text-gray-700 mb-1">Confirme sua Senha!</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                                    <i class="fa-solid fa-eye" aria-hidden="true"></i>
                                </span>
                                <input type="password" id="IDconfirmSenha" name="segunda-senha" required placeholder="**********" class="block w-full pl-10 pr-10 py-2 border border-gray-300 rounded-md focus:ring-cyan-500 focus:border-cyan-500 sm:text-sm">
                            </div>
                        </div>
                        <!--ROUBO DE INDENTIDADE AUTORIZADO HEHEHEH-->
                        <div class="flex items-center gap-2 py-2">
                            <input type="checkbox" id="terms-checkbox" required class="h-4 w-4 text-cyan-600 border-gray-300 rounded focus:ring-cyan-500 focus:outline-none">
                            <label for="terms-checkbox" class="text-sm text-gray-600">
                                Concordo com os <a href="#" class="text-blue-600 underline">Termos de vendas da minha privacidade</a>
                            </label>
                        </div>
                        <button type="submit" class="w-full bg-cyan-400 hover:bg-cyan-500 text-white font-bold py-2.5 rounded-md shadow-sm transition duration-150">
                            Criar conta
                        </button>
                        <p class="text-center text-xs text-gray-500 mt-4">
                            Já tem uma conta? <a href="/login" class="text-blue-600 font-bold hover:underline">Entrar</a>
                        </p>
                    </form>
                </div>
            </main>
            <footer class="py-6 text-center border-t border-gray-200">
                <p class="text-gray-400 text-[10px]">Copyrights: 2026 Audiary -  Todos os direitos reservados para os fundadores.</p>
            </footer>
            <script src="/public/accessibility.js"></script>
            <script>
                function buscarCEP(){
                    let cep = document.getElementById('IDcep').value.replace(/\D/g,'');
                        if(cep !== ""){
                            let validacep = /^[0-9]{8}$/;

                            if(validacep.test(cep)){
                                document.getElementById('IDrua').value = "...";

                                fetch(`https://viacep.com.br/ws/${cep}/json/`)
                                    .then(response => response.json())
                                    .then(dados => {
                                        if(!("erro" in dados)){
                                            document.getElementById('IDrua').value = dados.logradouro + " - " + dados.bairro; 
                                        }else{
                                            alert("CEP não encontrado :(");
                                            document.getElementById('IDrua').value = "";
                                        }
                                    });
                            }
                        }
                }
            </script>
        </body>
    </html>
