<!DOCTYPE html>
<html lang="pt-br">
    <head>
       <script src="https://cdn.tailwindcss.com"></script>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Audiary/Recuperacao_Senha</title>
        <link rel="stylesheet" href="/public/accessibility.css">
    </head>
    
    <body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">
        <a href="#main-content" class="skip-link">Ir para o conteúdo principal</a>
        <main id="main-content" class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md my-auto">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-blue-600">Audiary</h1>
                <p class="text-gray-500 mt-2">Esqueceu a sua senha? Normal! recupere aqui!</p>
            </div>
            <p class="text-sm text-gray-600 mb-6">
                Insira Aqui o email que você lembra estar cadastrado e então enviaremos uma mensagem para ti!
            </p>
            <form class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700">Seu Email:</label>
                    <input type="email" id="email" name="email" required placeholder="JoãoAltinho@vasco.com"
                        class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">

                </div>
                <button type="submit"
                    class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-700 transition duration-200 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    Enviar Link de recuperação!
                </button>
            </form>
            <div class="mt-6 text-center">
                <a href="/login" class="text-sm text-blue-600 hover:underline">Voltar para o Login</a>
            </div>

        </main>
        <footer class="py-6 text-center mt-auto w-full">
            <p class="text-gray-400 text-sm">Copyrights: 2026 Audiary - Todos os direitos reservados.</p>
        </footer>
        <script src="/public/accessibility.js"></script>
        <script>
            const form = document.querySelector('form');
            const submitBtn = form.querySelector('button[type="submit"]');
            
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                submitBtn.disabled = true;
                submitBtn.textContent = 'Enviando...';
                
                const formData = new FormData(form);
                const email = formData.get('email');
                
                try {
                    const response = await fetch('/users/recover-password', {
                        method: 'POST',
                        body: formData
                    });
                    if (response.ok) {
                        window.location.href = `/senha-esquecida/sucesso?email=${encodeURIComponent(email)}`;
                    } else {
                        alert('Erro ao enviar email de recuperação.');
                    }
                } catch (error) {
                    alert('Erro de conexão com o servidor.');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Enviar Link de recuperação!';
                }
            });
        </script>
    </body>
</html>
