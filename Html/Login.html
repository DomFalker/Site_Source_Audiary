<!DOCTYPE html>
    <html lang= "pt-br">

        <head>
            <meta charset="UTF-8">
            <title>Audiary.Login</title>
            <link rel="stylesheet" href="../styles/style02.css">
        </head>

            <div class="Nav-Bar">
                <h1 class="logo-text-login">Audiary</h1>
                <nav>
                    <a class="Link-Cadastro" href=cadastro.html>Não possui uma conta? Cadastrar</a>
                </nav>
            </div>
        
        <body>
            <main class="pagina-login">     
                <div class="">
                <h1 class="Texto_login">Entrar</h1>
                    <form action="" method="post">

                        <div class="Login-User-Input">
                        <label for="IDusuario">Nome de usuário:</label>
                        <input type="text" id="IDusuario" name="usuario" required>
                        </div>

                        <div class="Login-Senha-Input">
                        <label for="IDsenha">Senha:</label>
                        <input type="password" id="IDsenha" name="senha" required>
                        </div>

                        <button type="submit">Entrar</button>
                    </form>
                </div>
            </main>
        </body>
    </html>
